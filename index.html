<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Discovery</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');

        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #312e81 0%, transparent 50%),
                              radial-gradient(circle at 0% 100%, #1e1b4b 0%, transparent 50%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.5);
        }

        .icon-wrapper svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: white;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-weight: 600;
            font-size: 1.8rem;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(to right, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: translateY(1px);
        }

        button.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        button.loading::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-top: -10px;
            margin-left: -10px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        button.loading span {
            opacity: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            min-height: 20px;
            transition: all 0.3s ease;
        }

        .success { color: #10b981; }
        .error { color: #ef4444; }

    </style>
</head>
<body>

    <div class="container">
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
        </div>
        <h1>Location Demo</h1>
        <p>Help us improve your experience by securely sharing your current location.</p>
        
        <button id="actionBtn" onclick="getLocation()">
            <span>Share Location</span>
        </button>

        <div id="statusMsg" class="status"></div>
    </div>

    <script>
        // REPLACE THESE WITH YOUR ACTUAL SUPABASE DETAILS
        const SUPABASE_URL = "https://oyherhkvrsxoalcczdam.supabase.co";
        const SUPABASE_KEY = "sb_publishable_8HUqdgZm1HaL3wLYwIC9OQ_2c8QaK2R";

        const btn = document.getElementById('actionBtn');
        const statusMsg = document.getElementById('statusMsg');

        function setStatus(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.className = 'status ' + type;
            btn.classList.remove('loading');
        }

        async function getLocation() {
            btn.classList.add('loading');
            statusMsg.textContent = '';
            
            if (!navigator.geolocation) {
                setStatus("Geolocation is not supported by your browser", "error");
                return;
            }

            navigator.geolocation.getCurrentPosition(saveLocation, errorHandler, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        }

        function errorHandler(error) {
            let msg = "Location permission denied or unavailable";
            if (error.code === 1) msg = "You denied location permission.";
            else if (error.code === 2) msg = "Location unavailable.";
            else if (error.code === 3) msg = "Location request timed out.";
            
            setStatus(msg, "error");
        }

        async function saveLocation(position) {
            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;
            const accuracy = position.coords.accuracy;

            console.log(`Lat: ${latitude}, Lng: ${longitude}, Acc: ${accuracy}`);

            if (SUPABASE_URL === "YOUR_URL" || SUPABASE_KEY === "YOUR_ANON_KEY") {
                setStatus("Please configure your Supabase URL and Key in the code.", "error");
                return;
            }

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/locations`, {
                    method: "POST",
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify({ latitude, longitude, accuracy })
                });

                if (response.ok) {
                    setStatus("Location saved successfully! Thank you.", "success");
                    btn.innerHTML = "<span>Shared!</span>";
                    btn.style.background = "linear-gradient(135deg, #10b981, #059669)";
                    btn.onclick = null;
                } else {
                    const err = await response.text();
                    console.error(err);
                    setStatus("Failed to save to database.", "error");
                }
            } catch (err) {
                console.error(err);
                setStatus("Network error occurred.", "error");
            }
        }
    </script>
</body>
</html>
